<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTFlix - Catálogo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">EST<span>Flix</span></div>
            <ul class="nav-links">
                <li><a href="catalogo.html">Início</a></li>
                <li><a href="admin.html">Administração</a></li>
                <li><button id="btn-logout" class="btn-logout-link">Sair</button></li>
            </ul>
            <div class="user-display">
            <span id="nome-perfil"></span>
            <div class="user-avatar-small" style="width:30px; height:30px; background:#555; border-radius:3px; overflow:hidden;">
        <img id="foto-perfil" src="" alt="Perfil" style="width:30px; height:30px; object-fit:cover;">   
            </div>
        </div>
        </nav>
    </header>

    <main>
    <section class="row">
        <h2>Populares</h2>
        <div id="lista-populares" class="movie-row"></div>
    </section>

    <section class="row">
        <h2>Os Meus Favoritos</h2>
        <div id="lista-favoritos" class="movie-row"></div>
    </section>
</main>

<div id="movie-modal" class="modal hidden">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-body">
            <img id="modal-img" src="" alt="Capa">
            <div class="modal-text">
                <h2 id="modal-titulo"></h2>
                <p id="modal-descricao"></p>
                <button id="btn-favorito" class="btn-primary">Adicionar aos Favoritos</button>
            </div>
        </div>
    </div>
</div>

    <script src="js/storage.js"></script>
    <script src="js/catalogo.js"></script>
    <script src="js/dados.js"></script>
</body>
</html>
